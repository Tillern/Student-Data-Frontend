<div class="student-report-container mat-elevation-z4">
  <h2>Student Report</h2>

  <mat-card>
    <div class="filters">
      <mat-form-field appearance="fill">
        <mat-label>Student ID</mat-label>
        <input matInput type="number" [(ngModel)]="filterStudentId" placeholder="Filter by Student ID" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Class</mat-label>
        <mat-select [(ngModel)]="filterClass">
          <mat-option value="">All Classes</mat-option>
          <mat-option *ngFor="let cls of classes" [value]="cls">{{ cls }}</mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="loadStudents()">Filter</button>
    </div>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

      <ng-container matColumnDef="studentId">
        <th mat-header-cell *matHeaderCellDef>Student ID</th>
        <td mat-cell *matCellDef="let student">{{ student.studentId }}</td>
      </ng-container>

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef>First Name</th>
        <td mat-cell *matCellDef="let student">{{ student.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef>Last Name</th>
        <td mat-cell *matCellDef="let student">{{ student.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="dob">
        <th mat-header-cell *matHeaderCellDef>DOB</th>
        <td mat-cell *matCellDef="let student">{{ student.dob }}</td>
      </ng-container>

      <ng-container matColumnDef="studentClass">
        <th mat-header-cell *matHeaderCellDef>Class</th>
        <td mat-cell *matCellDef="let student">{{ student.studentClass }}</td>
      </ng-container>

      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef>Score</th>
        <td mat-cell *matCellDef="let student">{{ student.score }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>

    <mat-paginator [length]="totalRecords"
                   [pageSize]="pageSize"
                   [pageSizeOptions]="[100, 500, 1000]"
                   (page)="onPageChange($event)">
    </mat-paginator>

    <div class="export-buttons">
      <button mat-raised-button color="accent" (click)="exportReport('xlsx')">Export Excel</button>
      <button mat-raised-button color="warn" (click)="exportReport('csv')">Export CSV</button>
    </div>
  </mat-card>
</div>
