<mat-card class="generate-card">
  <mat-card-title>Excel → CSV Processor</mat-card-title>
  <mat-card-content>
    <div class="form-group">
      <input type="file" (change)="onFileSelected($event)" accept=".xlsx" />
    </div>

    <div class="form-actions">
      <button mat-raised-button color="primary" (click)="uploadExcel()" [disabled]="isProcessing || !selectedFile">
        {{ isProcessing ? 'Processing...' : 'Upload & Convert' }}
      </button>
    </div>
  </mat-card-content>
</mat-card>
