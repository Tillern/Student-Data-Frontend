<div class="generate-container">
  <div class="card shadow-sm p-4">
    <h4 class="mb-3">🛠 Generate Data</h4>
    <div class="row g-3 align-items-center">
      <div class="col-md-4">
        <input
          type="number"
          class="form-control"
          placeholder="Total records"
          [(ngModel)]="totalRecords"
        />
      </div>
      <div class="col-md-3">
        <button class="btn btn-success w-100" (click)="generateData()">Generate</button>
      </div>
    </div>

    <div *ngIf="loading" class="text-center my-3">
      <div class="spinner-border text-success" role="status"></div>
    </div>

    <div *ngIf="message" class="alert alert-success mt-3">{{ message }}</div>
  </div>
</div>
