<div class="students-container">
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h4 class="mb-3">🔍 Search Students By Class</h4>
      <div class="row g-3 align-items-center">
        <div class="col-md-6">
          <input
            type="text"
            class="form-control form-control-lg"
            placeholder="Class name e.g. Class1"
            [(ngModel)]="studentClass"
          />
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary btn-lg w-100" (click)="search()">Search</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center my-4">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <table *ngIf="!loading && students.length" class="table table-striped table-hover shadow-sm">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>DOB</th>
        <th>Class</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of students">
        <td>{{ s.studentId }}</td>
        <td>{{ s.firstName }}</td>
        <td>{{ s.lastName }}</td>
        <td>{{ s.dob }}</td>
        <td>{{ s.studentClass }}</td>
        <td>{{ s.score }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && students.length === 0" class="alert alert-warning">No students found</div>
</div>
