<div class="process-container">
  <div class="card shadow-sm p-4">
    <h4 class="mb-3">⚡ Process Data</h4>
    <div class="row g-3 align-items-center">
      <div class="col-md-4">
        <input
          type="number"
          class="form-control"
          placeholder="Batch size"
          [(ngModel)]="batchSize"
        />
      </div>
      <div class="col-md-3">
        <button class="btn btn-warning w-100" (click)="processData()">Process</button>
      </div>
    </div>

    <div *ngIf="loading" class="text-center my-3">
      <div class="spinner-border text-warning" role="status"></div>
    </div>

    <div *ngIf="result" class="alert alert-warning mt-3">{{ result }}</div>
  </div>
</div>
