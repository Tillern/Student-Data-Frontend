<div class="upload-container">
  <div class="card shadow-sm p-4">
    <h4 class="mb-3">📤 Upload File</h4>
    <input type="file" class="form-control mb-3" (change)="onFileChange($event)" />
    <button class="btn btn-info w-100" (click)="uploadFile()" [disabled]="!selectedFile">
      Upload
    </button>

    <div *ngIf="loading" class="text-center my-3">
      <div class="spinner-border text-info" role="status"></div>
    </div>

    <div *ngIf="message" class="alert alert-info mt-3">{{ message }}</div>
  </div>
</div>
