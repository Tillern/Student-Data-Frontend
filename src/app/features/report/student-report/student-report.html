<div class="report-container">
  <div class="card shadow-sm p-4">
    <h4 class="mb-3">📊 Student Reports</h4>
    <div class="row g-3">
      <div class="col-md-3">
        <input type="date" class="form-control" [(ngModel)]="fromDate" />
      </div>
      <div class="col-md-3">
        <input type="date" class="form-control" [(ngModel)]="toDate" />
      </div>
      <div class="col-md-2">
        <button class="btn btn-secondary w-100" (click)="generateReport()">Generate</button>
      </div>
    </div>

    <div *ngIf="loading" class="text-center my-3">
      <div class="spinner-border text-secondary" role="status"></div>
    </div>

    <table
      *ngIf="!loading && reportData.length"
      class="table table-striped table-hover mt-3 shadow-sm"
    >
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of reportData">
          <td>{{ r.studentId }}</td>
          <td>{{ r.name }}</td>
          <td>{{ r.score }}</td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="!loading && reportData.length === 0" class="alert alert-warning mt-3">
      No report data found
    </div>
  </div>
</div>
